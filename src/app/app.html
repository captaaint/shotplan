<h1>{{ title() }}</h1>
<h2>Upcoming sessions</h2>

<ul class="session-list">
  @for (session of sessions(); track session.id) {
    <li class="session-row">
      <div class="session-main">
        <strong>{{ session.clientName }}</strong>
        <span>{{ session.type }}</span>
        <span>{{ session.date | date: 'yyyy-MM-dd' }}</span>
      </div>

      <span
        class="status-badge"
        [class.status-inquiry]="session.status === 'inquiry'"
        [class.status-booked]="session.status === 'booked'"
        [class.status-done]="session.status === 'done'"
      >
        {{ session.status }}
      </span>

      @if (session.galleryUrl) {
        <a class="gallery-link" [href]="session.galleryUrl">Gallery</a>
      }
    </li>
  } @empty {
    <li>No sessions scheduled yet.</li>
  }
</ul>
