<h1>{{ title() }}</h1>
<h2>Upcoming sessions</h2>

<ul>
  @for (session of sessions(); track session.id) {
    <li>
      <strong>{{ session.clientName }}</strong>
      <span> - {{ session.type }}</span>
      <span> - {{ session.date | date: 'yyyy-MM-dd' }}</span>
      <span> - {{ session.status }}</span>

      @if (session.galleryUrl) {
        <a [href]="session.galleryUrl">Gallery</a>
      }
    </li>
  } @empty {
    <li>No sessions scheduled yet.</li>
  }
</ul>
