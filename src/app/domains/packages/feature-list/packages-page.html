<app-page-header title="Packages" subtitle="Offers available for sessions">
  <a page-actions class="primary-link" routerLink="/packages/new">New package</a>
</app-page-header>

@if (packageStore.loading()) {
  <app-loading-state message="Loading packages"></app-loading-state>
} @else if (packageStore.error(); as error) {
  <app-error-state [message]="error" (retry)="packageStore.loadPackages()"></app-error-state>
} @else if (packageStore.packages().length) {
  <div class="table-panel">
    <table mat-table [dataSource]="packageStore.packages()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let package">{{ package.name }}</td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let package">
          {{ package.price | currency: 'USD' : 'symbol' : '1.0-0' }}
        </td>
      </ng-container>
      <ng-container matColumnDef="durationMinutes">
        <th mat-header-cell *matHeaderCellDef>Duration</th>
        <td mat-cell *matCellDef="let package">{{ package.durationMinutes }} min</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let package">
          <a mat-icon-button [routerLink]="['/packages', package.id]" aria-label="View package">
            <mat-icon>visibility</mat-icon>
          </a>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
} @else {
  <app-empty-state
    title="No packages yet"
    message="Create the first session package."
  ></app-empty-state>
}
