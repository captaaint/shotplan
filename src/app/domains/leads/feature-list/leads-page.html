<app-page-header title="Leads" subtitle="New inquiries and conversion pipeline">
  <a page-actions class="primary-link" routerLink="/leads/new">New lead</a>
</app-page-header>

@if (leadStore.loading()) {
  <app-loading-state message="Loading leads"></app-loading-state>
} @else if (leadStore.error(); as error) {
  <app-error-state [message]="error" (retry)="leadStore.loadLeads()"></app-error-state>
} @else if (leadStore.leads().length) {
  <div class="table-panel">
    <table mat-table [dataSource]="leadStore.leads()">
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let lead">{{ lead.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="sessionType">
        <th mat-header-cell *matHeaderCellDef>Session</th>
        <td mat-cell *matCellDef="let lead">{{ lead.sessionType }}</td>
      </ng-container>

      <ng-container matColumnDef="source">
        <th mat-header-cell *matHeaderCellDef>Source</th>
        <td mat-cell *matCellDef="let lead">{{ lead.source }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let lead">{{ lead.status }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let lead">
          <a mat-icon-button [routerLink]="['/leads', lead.id]" aria-label="View lead">
            <mat-icon>visibility</mat-icon>
          </a>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
} @else {
  <app-empty-state
    title="No leads yet"
    message="Create the first lead from a new inquiry."
  ></app-empty-state>
}
