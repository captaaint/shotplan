<form class="client-form" [formGroup]="form" (ngSubmit)="submit()">
  <app-form-field label="Full name" [control]="form.controls.fullName">
    <input type="text" formControlName="fullName" autocomplete="name" />
  </app-form-field>

  <app-form-field label="Email" [control]="form.controls.email">
    <input type="email" formControlName="email" autocomplete="email" />
  </app-form-field>

  <app-form-field label="Phone" [control]="form.controls.phone">
    <input type="tel" formControlName="phone" autocomplete="tel" />
  </app-form-field>

  <app-form-field label="Instagram handle" [control]="form.controls.instagramHandle">
    <input type="text" formControlName="instagramHandle" autocomplete="off" />
  </app-form-field>

  <app-form-field label="Notes" [control]="form.controls.notes" [wide]="true">
    <textarea rows="5" formControlName="notes"></textarea>
  </app-form-field>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || saving()">
      {{ saving() ? 'Saving...' : submitLabel() }}
    </button>
  </div>
</form>
