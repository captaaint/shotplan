<app-page-header title="New client" subtitle="Create a contact for future sessions">
  <a page-actions class="back-link" routerLink="/clients">Back to clients</a>
</app-page-header>

@if (clientStore.error(); as error) {
  <p class="form-error" role="alert">{{ error }}</p>
}

<form class="client-form" [formGroup]="form" (ngSubmit)="submit()">
  <label>
    <span>Full name</span>
    <input type="text" formControlName="fullName" autocomplete="name" />
    @if (form.controls.fullName.touched && form.controls.fullName.hasError('required')) {
      <small>Full name is required.</small>
    }
  </label>

  <label>
    <span>Email</span>
    <input type="email" formControlName="email" autocomplete="email" />
    @if (form.controls.email.touched && form.controls.email.hasError('required')) {
      <small>Email is required.</small>
    } @else if (form.controls.email.touched && form.controls.email.hasError('email')) {
      <small>Enter a valid email address.</small>
    }
  </label>

  <label>
    <span>Phone</span>
    <input type="tel" formControlName="phone" autocomplete="tel" />
    @if (form.controls.phone.touched && form.controls.phone.hasError('required')) {
      <small>Phone is required.</small>
    }
  </label>

  <label>
    <span>Instagram handle</span>
    <input type="text" formControlName="instagramHandle" autocomplete="off" />
  </label>

  <label class="wide-field">
    <span>Notes</span>
    <textarea rows="5" formControlName="notes"></textarea>
  </label>

  <div class="form-actions">
    <button type="submit" [disabled]="form.invalid || submitting()">
      {{ submitting() ? 'Saving...' : 'Create client' }}
    </button>
  </div>
</form>
