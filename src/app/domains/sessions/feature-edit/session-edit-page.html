<app-page-header title="Edit session" subtitle="Update shoot details and shot list">
  <a page-actions class="back-link" routerLink="/sessions">Back to sessions</a>
</app-page-header>

@if (sessionStore.loading() || clientStore.loading()) {
  <app-loading-state message="Loading session"></app-loading-state>
} @else if (sessionStore.error(); as error) {
  <app-error-state [message]="error" (retry)="retryLoad()"></app-error-state>
} @else if (clientStore.error(); as error) {
  <app-error-state [message]="error" (retry)="clientStore.loadClients()"></app-error-state>
} @else if (session(); as session) {
  <app-session-form
    submitLabel="Update session"
    [clients]="clientStore.clients()"
    [session]="session"
    [saving]="submitting()"
    (save)="updateSession($event)"
  ></app-session-form>
} @else {
  <app-empty-state
    title="Session not found"
    message="Return to the sessions list and choose an existing session."
  ></app-empty-state>
}
