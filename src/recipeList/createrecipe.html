<a class="btn btn-primary mb-3" routerLink="/recipes">Back to Recipe List</a>

<div class="card shadow-sm mb-4 p-3">
  <form (submit)="submit($event)">
    <div class="mb-3">
      <label for="recipeName" class="form-label">Recipe Name</label>
      <input id="recipeName" type="text" class="form-control" [formField]="recipeForm.name" />
    </div>

    <div class="mb-3">
      <label for="recipeDescription" class="form-label">Description</label>
      <textarea
        id="recipeDescription"
        class="form-control"
        rows="3"
        [formField]="recipeForm.description"
      ></textarea>
    </div>

    <div class="mb-3">
      <label for="recipeAuthorEmail" class="form-label">Author Email</label>
      <input
        id="recipeAuthorEmail"
        type="email"
        class="form-control"
        [formField]="recipeForm.authorEmail"
      />
    </div>

    <submit-button></submit-button>
  </form>
</div>
