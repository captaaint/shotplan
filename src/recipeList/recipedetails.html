<div class="card shadow-sm">
  <img class="card-img-top recipe-image" [src]="recipe().imageUrl" [alt]="recipe().name" />

  <div class="card-body d-flex flex-column gap-3">
    <div>
      <h2 class="card-title h3 mb-2">{{ recipe().name }}</h2>
      <p class="card-text text-body-secondary mb-0">{{ recipe().description }}</p>
    </div>

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
      <p class="mb-0 fw-semibold">Servings: {{ servings() }}</p>

      <div class="btn-group" role="group" aria-label="Adjust servings">
        <button type="button" class="btn btn-outline-secondary" (click)="decrease()">Decrease</button>
        <button type="button" class="btn btn-outline-secondary" (click)="increase()">Increase</button>
      </div>
    </div>

    <div>
      <h3 class="h5 mb-3">Ingredients</h3>
      <ul class="list-group list-group-flush">
        @for (ingredient of ingredients(); track ingredient.name) {
          <li class="list-group-item px-0">
            {{ ingredient.name }} - {{ ingredient.quantity }} {{ ingredient.unit }}
          </li>
        }
      </ul>
    </div>
  </div>
</div>
